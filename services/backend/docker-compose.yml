version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: catdog_mario_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: catdog_mario_dev
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: catdog_mario_backend
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
